<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원자량 플래시카드</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body style="margin: 0;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const cards = [
            { id: 1, emoji: "⚛️", term: "원자량 (Atomic Mass)", front: "원자량이란?", back: "탄소-12 원자의 질량을 12로 정했을 때, 이를 기준으로 다른 원자의 상대적인 질량을 나타낸 값.\n\n단위 없음 (무차원)\n예) H = 1, C = 12, O = 16", color: "#e8f4fd", accent: "#2196F3" },
            { id: 2, emoji: "🔬", term: "아보가드로 법칙", front: "아보가드로 법칙이란?", back: "같은 온도·압력에서 모든 기체는 같은 부피 속에 같은 수의 분자를 포함한다.\n\n0°C, 1기압(STP)에서\n기체 1몰 = 22.4 L", color: "#fdf3e8", accent: "#FF9800" },
            { id: 3, emoji: "🔢", term: "아보가드로 수 (Nₐ)", front: "아보가드로 수란?", back: "1몰에 들어있는 입자의 개수\n\nNₐ = 6.022 × 10²³ /mol\n\n예) 탄소 1몰 = 탄소 원자 6.022×10²³개", color: "#f3e8fd", accent: "#9C27B0" },
            { id: 4, emoji: "📦", term: "몰 (mol)", front: "몰이란?", back: "물질의 양을 나타내는 단위\n\n1몰 = 6.022 × 10²³ 개의 입자\n\n마치 '다스(12개)', '그로스(144개)'처럼\n원자/분자의 묶음 단위", color: "#e8fdf3", accent: "#4CAF50" },
            { id: 5, emoji: "⚖️", term: "몰질량 (Molar Mass)", front: "몰질량이란?", back: "물질 1몰의 질량 (g/mol)\n\n• 원소의 몰질량 = 원자량(g/mol)\n• 물(H₂O) 몰질량 = 2(1) + 16 = 18 g/mol\n\n몰질량을 알면 질량 ↔ 몰 변환 가능", color: "#fde8e8", accent: "#F44336" },
            { id: 6, emoji: "🧬", term: "분자량 (Molecular Mass)", front: "분자량이란?", back: "분자를 구성하는 모든 원자의 원자량 합\n\n예) CO₂\n= 12 + 16×2 = 44\n\n단위 없음 (무차원)\n몰질량과 숫자는 같지만 단위가 다름", color: "#e8eafd", accent: "#3F51B5" },
            { id: 7, emoji: "🔄", term: "몰 계산 공식", front: "몰, 질량, 입자 수 관계는?", back: "몰(n) = 질량(g) ÷ 몰질량(g/mol)\n몰(n) = 입자수 ÷ 6.022×10²³\n\n예) 물 36g\n→ 36 ÷ 18 = 2몰\n→ 2 × 6.022×10²³ = 1.204×10²⁴ 분자", color: "#fdfbe8", accent: "#CDDC39" },
            { id: 8, emoji: "💡", term: "원자량 기준", front: "원자량의 기준이 되는 원소는?", back: "탄소-12 (¹²C)\n\n탄소-12의 질량을 정확히 12로 정의\n→ 다른 모든 원소의 원자량 결정\n\n과거엔 산소(O=16) 기준을 사용했으나\n1961년 탄소-12로 변경", color: "#e8fdf8", accent: "#009688" }
        ];

        function FlashCards() {
            const [current, setCurrent] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const [completed, setCompleted] = useState(new Set());

            const card = cards[current];

            const next = () => { setFlipped(false); setTimeout(() => setCurrent((c) => (c + 1) % cards.length), 150); };
            const prev = () => { setFlipped(false); setTimeout(() => setCurrent((c) => (c - 1 + cards.length) % cards.length), 150); };
            const markDone = () => { setCompleted((prev) => new Set([...prev, card.id])); next(); };

            return (
                <div style={{ minHeight: "100vh", background: "#0f0f13", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: "'Noto Sans KR', sans-serif", padding: "20px" }}>
                    <div style={{ marginBottom: "32px", textAlign: "center" }}>
                        <h1 style={{ color: "#fff", fontSize: "28px", fontWeight: 900, margin: 0 }}>원자량 플래시카드</h1>
                    </div>
                    <div style={{ display: "flex", gap: "6px", marginBottom: "28px" }}>
                        {cards.map((c, i) => (
                            <div key={c.id} style={{ width: "28px", height: "6px", borderRadius: "3px", background: completed.has(c.id) ? "#4CAF50" : i === current ? card.accent : "#333", transition: "all 0.3s" }} />
                        ))}
                    </div>
                    <div onClick={() => setFlipped(!flipped)} style={{ width: "min(420px, 90vw)", height: "320px", perspective: "1000px", cursor: "pointer", position: "relative" }}>
                        <div style={{ width: "100%", height: "100%", transformStyle: "preserve-3d", transform: flipped ? "rotateY(180deg)" : "rotateY(0deg)", transition: "transform 0.5s", position: "relative" }}>
                            <div style={{ position: "absolute", width: "100%", height: "100%", backfaceVisibility: "hidden", background: card.color, borderRadius: "20px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px", boxSizing: "border-box" }}>
                                <div style={{ fontSize: "52px", marginBottom: "20px" }}>{card.emoji}</div>
                                <div style={{ fontSize: "22px", fontWeight: 700, color: "#1a1a2e" }}>{card.front}</div>
                            </div>
                            <div style={{ position: "absolute", width: "100%", height: "100%", backfaceVisibility: "hidden", transform: "rotateY(180deg)", background: "#1a1a2e", borderRadius: "20px", display: "flex", flexDirection: "column", padding: "32px", boxSizing: "border-box", borderLeft: `5px solid ${card.accent}`, color: "#fff" }}>
                                <div style={{ fontSize: "16px", lineHeight: 1.8, whiteSpace: "pre-line" }}>{card.back}</div>
                            </div>
                        </div>
                    </div>
                    <div style={{ display: "flex", gap: "12px", marginTop: "32px" }}>
                        <button onClick={prev} style={{ background: "#1e1e26", color: "#fff", border: "none", borderRadius: "12px", padding: "12px 24px", cursor: "pointer" }}>이전</button>
                        <button onClick={markDone} style={{ background: "#4CAF50", color: "#fff", border: "none", borderRadius: "12px", padding: "12px 20px", cursor: "pointer", fontWeight: 700 }}>완료</button>
                        <button onClick={next} style={{ background: "#1e1e26", color: "#fff", border: "none", borderRadius: "12px", padding: "12px 24px", cursor: "pointer" }}>다음</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FlashCards />);
    </script>
</body>
</html>
